# Configuración de Alembic para gestión de migraciones

[alembic]
# Path a la carpeta de scripts de migración
script_location = alembic

# Template usado para generar archivos de migración
file_template = %%(rev)s_%%(slug)s

# Timezone para timestamps
timezone = UTC

# Configuración de salida
truncate_slug_length = 40

# URL de la base de datos (puede sobrescribirse via env.py)
sqlalchemy.url = sqlite:///./orders.db

[post_write_hooks]
# Hooks para formateo automático (opcional)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
